apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:v1
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: app-config